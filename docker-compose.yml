services:
  qna-fastapi:
    build: .
    container_name: qna_fastapi_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sqlite_data:/app/data
      - ./vector_db_stores:/app/vector_db_stores
    environment:
      - DATABASE_URL=sqlite:////./app/data/sql_app.db
      - PERSIST_DIR=/app/vector_db_stores/faiss_store
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  sqlite_data: